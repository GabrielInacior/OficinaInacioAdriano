<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar" class="sidebar">
  <div class="sidebar-logo">
    <h2>🔧 Oficina</h2>
    <p>Inácio Adriano</p>
  </div>
  <nav class="sidebar-nav">
    <a data-page="dashboard" onclick="navigateTo('dashboard')">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <div class="nav-section">Atendimento</div>
    <a data-page="ordens-servico" onclick="navigateTo('ordens-servico')">
      <span class="nav-icon">📋</span> Ordens de Serviço
    </a>
    <div class="nav-section">Cadastros</div>
    <a data-page="clientes" onclick="navigateTo('clientes')">
      <span class="nav-icon">👤</span> Clientes
    </a>
    <a data-page="veiculos" onclick="navigateTo('veiculos')">
      <span class="nav-icon">🚗</span> Veículos
    </a>
    <a data-page="mecanicos" onclick="navigateTo('mecanicos')">
      <span class="nav-icon">🔨</span> Mecânicos
    </a>
    <a data-page="pecas" onclick="navigateTo('pecas')">
      <span class="nav-icon">⚙️</span> Peças
    </a>
    <div class="nav-section">Financeiro</div>
    <a data-page="pagamentos" onclick="navigateTo('pagamentos')">
      <span class="nav-icon">💳</span> Pagamentos
    </a>
    <div class="nav-section">Configurações</div>
    <a data-page="perfil" onclick="navigateTo('perfil')">
      <span class="nav-icon">⚙️</span> Meu Perfil
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user" onclick="navigateTo('perfil')">
      <div class="user-avatar" id="sidebar-avatar">U</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Usuário</div>
        <div class="user-role" id="sidebar-role">USER</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-full" style="color:var(--gray-400);margin-top:8px;" onclick="doLogout()">
      ↩ Sair
    </button>
  </div>
</aside>

</body>
</html>
