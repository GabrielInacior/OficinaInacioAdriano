<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="page-perfil" id="page-perfil" class="page">
  <div class="card" style="max-width:540px;">
    <div class="card-header"><span class="card-title">Meu Perfil</span></div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input id="perfil-nome" type="text" class="form-input" />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="perfil-email" type="email" class="form-input" />
    </div>
    <button class="btn btn-primary" onclick="saveProfile()">Salvar</button>

    <div class="divider"></div>

    <div class="card-title" style="margin-bottom:16px;">Verificação em 2 Etapas</div>
    <p class="text-muted text-sm" style="margin-bottom:12px;">
      Quando ativo, um código será enviado ao seu email a cada login.
    </p>
    <div style="display:flex;gap:10px;">
      <button id="btn-2fa-on"  class="btn btn-success btn-sm" onclick="toggle2FA(true)">✅ Ativar 2FA</button>
      <button id="btn-2fa-off" class="btn btn-outline btn-sm" onclick="toggle2FA(false)">❌ Desativar 2FA</button>
    </div>

    <div class="divider"></div>

    <div class="card-title" style="margin-bottom:16px;">Alterar Senha</div>
    <div class="form-group">
      <label class="form-label">Senha Atual</label>
      <input id="pwd-atual" type="password" class="form-input" />
    </div>
    <div class="form-group">
      <label class="form-label">Nova Senha</label>
      <input id="pwd-nova" type="password" class="form-input" />
    </div>
    <button class="btn btn-warning" onclick="changePassword()">Alterar Senha</button>
  </div>
</div>

</body>
</html>
