<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="page-ordens-servico" id="page-ordens-servico" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Ordens de Serviço</span>
      <button class="btn btn-primary btn-sm" onclick="openModal('os')">+ Nova OS</button>
    </div>
    <div class="filters">
      <select class="filter-input" id="os-filter-status" onchange="loadOS()">
        <option value="">Todos os status</option>
        <option value="Aguardando">Aguardando</option>
        <option value="Em Andamento">Em Andamento</option>
        <option value="Finalizado">Finalizado</option>
        <option value="Cancelado">Cancelado</option>
      </select>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Cliente</th><th>Veículo</th>
            <th>Data Entrada</th><th>KM</th><th>Status</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="os-tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info" id="os-pagination-info"></span>
      <div class="pagination-controls" id="os-pagination-controls"></div>
    </div>
  </div>
</div>

</body>
</html>
