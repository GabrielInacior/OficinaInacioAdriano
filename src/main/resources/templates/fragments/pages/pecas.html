<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="page-pecas" id="page-pecas" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Peças</span>
      <button class="btn btn-primary btn-sm" onclick="openModal('peca')">+ Nova Peça</button>
    </div>
    <div class="filters">
      <input class="filter-input" type="text" id="peca-search" placeholder="Buscar por nome…" oninput="loadPecas()" />
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Nome</th><th>Categoria</th><th>Fornecedor</th><th>Preço</th><th>Est. Mín.</th><th>Ações</th></tr></thead>
        <tbody id="pecas-tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info" id="pecas-pagination-info"></span>
      <div class="pagination-controls" id="pecas-pagination-controls"></div>
    </div>
  </div>
</div>

</body>
</html>
