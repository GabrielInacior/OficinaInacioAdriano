<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="page-veiculos" id="page-veiculos" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Veículos</span>
      <button class="btn btn-primary btn-sm" onclick="openModal('veiculo')">+ Novo Veículo</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Placa</th><th>Modelo</th><th>Ano</th><th>Proprietário</th><th>Ações</th></tr></thead>
        <tbody id="veiculos-tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info" id="veiculos-pagination-info"></span>
      <div class="pagination-controls" id="veiculos-pagination-controls"></div>
    </div>
  </div>
</div>

</body>
</html>
