<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="page-dashboard" id="page-dashboard" class="page active">
  <div class="stats-grid" id="dash-stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">📋</div>
      <div class="stat-info">
        <div class="stat-label">OS Aguardando</div>
        <div class="stat-value" id="stat-aguardando">–</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">🔧</div>
      <div class="stat-info">
        <div class="stat-label">Em Andamento</div>
        <div class="stat-value" id="stat-andamento">–</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">💰</div>
      <div class="stat-info">
        <div class="stat-label">Receita do Mês</div>
        <div class="stat-value" id="stat-receita">–</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">⚠️</div>
      <div class="stat-info">
        <div class="stat-label">Estoque Baixo</div>
        <div class="stat-value" id="stat-estoque">–</div>
      </div>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">OS por Status</div>
      <canvas id="chart-status" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Receita por Semana</div>
      <canvas id="chart-receita" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top Mecânicos (OS Finalizadas)</div>
      <canvas id="chart-mecanicos" height="200"></canvas>
    </div>
  </div>
</div>

</body>
</html>
