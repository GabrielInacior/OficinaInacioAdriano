<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Inácio & Adriano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        accent:  { 50:'#fdf4ff',100:'#fae8ff',200:'#f5d0fe',300:'#f0abfc',400:'#e879f9',500:'#d946ef',600:'#c026d3',700:'#a21caf',800:'#86198f',900:'#701a75' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300 min-h-screen">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-200 dark:border-gray-700">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-600 rounded-2xl mb-4">
                    <i class="fas fa-wrench text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Oficina Inácio & Adriano</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Sistema de Gerenciamento</p>
            </div>

            <div id="loginTab">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                        <input type="email" id="loginEmail" required placeholder="seu@email.com"
                            class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha</label>
                        <input type="password" id="loginPassword" required placeholder="••••••"
                            class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition">
                    </div>
                    <button type="submit"
                        class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 rounded-xl transition-all duration-200 shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40">
                        <i class="fas fa-sign-in-alt mr-2"></i>Entrar
                    </button>
                </form>
                <p class="text-center mt-4 text-sm text-gray-500 dark:text-gray-400">
                    Não tem conta? <button onclick="showRegister()" class="text-primary-600 hover:underline font-medium">Cadastre-se</button>
                </p>
            </div>

            <div id="registerTab" class="hidden">
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome</label>
                        <input type="text" id="regName" required placeholder="Seu nome"
                            class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                        <input type="email" id="regEmail" required placeholder="seu@email.com"
                            class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha</label>
                        <input type="password" id="regPassword" required minlength="6" placeholder="Mínimo 6 caracteres"
                            class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition">
                    </div>
                    <button type="submit"
                        class="w-full bg-accent-600 hover:bg-accent-700 text-white font-semibold py-2.5 rounded-xl transition-all duration-200 shadow-lg shadow-accent-500/25">
                        <i class="fas fa-user-plus mr-2"></i>Cadastrar
                    </button>
                </form>
                <p class="text-center mt-4 text-sm text-gray-500 dark:text-gray-400">
                    Já tem conta? <button onclick="showLogin()" class="text-primary-600 hover:underline font-medium">Entrar</button>
                </p>
            </div>

            <div id="loginMsg" class="mt-4 text-center text-sm hidden"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appScreen" class="hidden">
        <!-- Top Nav -->
        <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-3">
                        <div class="inline-flex items-center justify-center w-9 h-9 bg-primary-600 rounded-lg">
                            <i class="fas fa-wrench text-white text-sm"></i>
                        </div>
                        <span class="font-bold text-lg text-gray-900 dark:text-white hidden sm:block">Oficina I&A</span>
                    </div>

                    <div class="flex items-center space-x-3">
                        <span id="userName" class="text-sm font-medium text-gray-600 dark:text-gray-300 hidden sm:block"></span>

                        <!-- Theme Toggle -->
                        <button onclick="toggleTheme()" title="Alternar tema"
                            class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                            <i id="themeIcon" class="fas fa-moon text-gray-600 dark:text-yellow-400"></i>
                        </button>

                        <!-- Profile -->
                        <button onclick="showSection('profile')" title="Perfil"
                            class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                            <i class="fas fa-user-cog text-gray-600 dark:text-gray-300"></i>
                        </button>

                        <!-- Logout -->
                        <button onclick="logout()" title="Sair"
                            class="p-2 rounded-xl bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 transition">
                            <i class="fas fa-sign-out-alt text-red-600 dark:text-red-400"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <!-- Sidebar Tabs (Horizontal on mobile) -->
            <div class="flex flex-wrap gap-2 mb-6" id="navTabs">
                <button onclick="showSection('dashboard')" data-section="dashboard"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-chart-pie mr-1"></i>Dashboard
                </button>
                <button onclick="showSection('clientes')" data-section="clientes"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-users mr-1"></i>Clientes
                </button>
                <button onclick="showSection('veiculos')" data-section="veiculos"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-car mr-1"></i>Veículos
                </button>
                <button onclick="showSection('mecanicos')" data-section="mecanicos"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-hard-hat mr-1"></i>Mecânicos
                </button>
                <button onclick="showSection('pecas')" data-section="pecas"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-cogs mr-1"></i>Peças
                </button>
                <button onclick="showSection('fornecedores')" data-section="fornecedores"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-truck mr-1"></i>Fornecedores
                </button>
                <button onclick="showSection('ordens')" data-section="ordens"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-clipboard-list mr-1"></i>Ordens
                </button>
                <button onclick="showSection('pagamentos')" data-section="pagamentos"
                    class="nav-tab px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    <i class="fas fa-credit-card mr-1"></i>Pagamentos
                </button>
            </div>

            <!-- Content Sections -->
            <div id="content">
                <!-- Dashboard -->
                <div id="sec-dashboard" class="section">
                    <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="dashboardCards"></div>
                </div>

                <!-- Generic CRUD sections -->
                <div id="sec-clientes" class="section hidden"></div>
                <div id="sec-veiculos" class="section hidden"></div>
                <div id="sec-mecanicos" class="section hidden"></div>
                <div id="sec-pecas" class="section hidden"></div>
                <div id="sec-fornecedores" class="section hidden"></div>
                <div id="sec-ordens" class="section hidden"></div>
                <div id="sec-pagamentos" class="section hidden"></div>

                <!-- Profile -->
                <div id="sec-profile" class="section hidden">
                    <h2 class="text-2xl font-bold mb-6">Perfil</h2>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 border border-gray-200 dark:border-gray-700 max-w-lg">
                        <form id="profileForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Nome</label>
                                <input type="text" id="profileName" required
                                    class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Email</label>
                                <input type="email" id="profileEmail" required
                                    class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none transition">
                            </div>
                            <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 px-6 rounded-xl transition">
                                <i class="fas fa-save mr-1"></i>Salvar
                            </button>
                        </form>

                        <hr class="my-6 border-gray-200 dark:border-gray-700">
                        <h3 class="font-semibold mb-4">Alterar Senha</h3>
                        <form id="passwordForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Senha Atual</label>
                                <input type="password" id="currentPassword" required
                                    class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Nova Senha</label>
                                <input type="password" id="newPassword" required minlength="6"
                                    class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none transition">
                            </div>
                            <button type="submit" class="bg-accent-600 hover:bg-accent-700 text-white font-medium py-2.5 px-6 rounded-xl transition">
                                <i class="fas fa-key mr-1"></i>Alterar Senha
                            </button>
                        </form>
                        <div id="profileMsg" class="mt-4 text-sm hidden"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 z-[100] hidden">
        <div class="px-6 py-3 rounded-xl shadow-2xl text-white text-sm font-medium flex items-center space-x-2">
            <i id="toastIcon" class="fas"></i>
            <span id="toastMsg"></span>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[90] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg border border-gray-200 dark:border-gray-700 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-6 border-b border-gray-200 dark:border-gray-700">
                <h3 id="modalTitle" class="text-lg font-bold"></h3>
                <button onclick="closeModal()" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <div id="modalBody" class="p-6"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
