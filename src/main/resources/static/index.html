<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Inácio & Adriano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <!-- ============ LOGIN SCREEN ============ -->
    <div id="loginScreen">
        <div class="login-bg-orbs">
            <div class="orb"></div>
            <div class="orb"></div>
            <div class="orb"></div>
        </div>

        <div class="login-card neu-flat">
            <div class="login-logo">
                <i class="fas fa-wrench" style="color:#fff;font-size:1.6rem"></i>
            </div>
            <h1 class="login-title">Oficina Inácio & Adriano</h1>
            <p class="login-subtitle">Sistema de Gerenciamento</p>

            <!-- Login Tab -->
            <div id="loginTab">
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="loginEmail" class="neu-input" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" id="loginPassword" class="neu-input" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="neu-btn neu-btn-primary" style="width:100%;margin-top:8px">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                <div class="login-switch">
                    Não tem conta? <button onclick="showRegister()">Cadastre-se</button>
                </div>
            </div>

            <!-- Register Tab -->
            <div id="registerTab" class="hidden">
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" id="regName" class="neu-input" placeholder="Seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="regEmail" class="neu-input" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" id="regPassword" class="neu-input" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <button type="submit" class="neu-btn neu-btn-accent" style="width:100%;margin-top:8px">
                        <i class="fas fa-user-plus"></i> Cadastrar
                    </button>
                </form>
                <div class="login-switch">
                    Já tem conta? <button onclick="showLogin()">Entrar</button>
                </div>
            </div>

            <div id="loginMsg" class="hidden"></div>
        </div>
    </div>

    <!-- ============ MAIN APPLICATION ============ -->
    <div id="appScreen" class="hidden">

        <!-- Top Navigation -->
        <nav class="app-nav neu-flat">
            <div class="nav-brand">
                <div class="nav-brand-icon">
                    <i class="fas fa-wrench"></i>
                </div>
                <span class="nav-brand-text">Oficina Inácio & Adriano</span>
            </div>
            <div class="nav-actions">
                <span id="userName" class="nav-user-name"></span>
                <button onclick="toggleTheme()" title="Alternar tema" class="neu-btn neu-btn-icon neu-btn-ghost">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
                <button onclick="showSection('profile')" title="Perfil" class="neu-btn neu-btn-icon neu-btn-ghost">
                    <i class="fas fa-user-cog"></i>
                </button>
                <button onclick="logout()" title="Sair" class="neu-btn neu-btn-icon neu-btn-ghost" style="color:var(--danger)">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </nav>

        <!-- Body: Sidebar + Content -->
        <div class="app-body">
            <!-- Sidebar -->
            <aside class="sidebar neu-flat" id="sidebar">
                <button class="sidebar-item active" data-section="dashboard" onclick="showSection('dashboard')">
                    <i class="fas fa-chart-pie"></i><span>Dashboard</span>
                </button>
                <button class="sidebar-item" data-section="clientes" onclick="showSection('clientes')">
                    <i class="fas fa-users"></i><span>Clientes</span>
                </button>
                <button class="sidebar-item" data-section="veiculos" onclick="showSection('veiculos')">
                    <i class="fas fa-car"></i><span>Veículos</span>
                </button>
                <button class="sidebar-item" data-section="mecanicos" onclick="showSection('mecanicos')">
                    <i class="fas fa-hard-hat"></i><span>Mecânicos</span>
                </button>
                <button class="sidebar-item" data-section="pecas" onclick="showSection('pecas')">
                    <i class="fas fa-cogs"></i><span>Peças</span>
                </button>
                <button class="sidebar-item" data-section="fornecedores" onclick="showSection('fornecedores')">
                    <i class="fas fa-truck"></i><span>Fornecedores</span>
                </button>
                <button class="sidebar-item" data-section="ordens" onclick="showSection('ordens')">
                    <i class="fas fa-clipboard-list"></i><span>Ordens</span>
                </button>
                <button class="sidebar-item" data-section="pagamentos" onclick="showSection('pagamentos')">
                    <i class="fas fa-credit-card"></i><span>Pagamentos</span>
                </button>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div id="sec-dashboard" class="section animate-fade-in"></div>
                <div id="sec-clientes" class="section hidden"></div>
                <div id="sec-veiculos" class="section hidden"></div>
                <div id="sec-mecanicos" class="section hidden"></div>
                <div id="sec-pecas" class="section hidden"></div>
                <div id="sec-fornecedores" class="section hidden"></div>
                <div id="sec-ordens" class="section hidden"></div>
                <div id="sec-pagamentos" class="section hidden"></div>
                <div id="sec-profile" class="section hidden"></div>
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal" class="hidden"></div>

    <!-- Scripts -->
    <script src="/js/app.js"></script>
</body>
</html>
